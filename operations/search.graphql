query Search($filter: SearchFilter!) {
  search(filter: $filter) {
    meta {
      page
      totalPages
      totalRecords
    }
    results {
      ... on Organisation {
        id
        routingCode
        name
        type
        logo {
          sizes {
            url
            dimensions {
              width
              height
            }
          }
        }
      }
    }
  }
}
